<!DOCTYPE html>
<html>
<head>

<title>Door Configuration</title>

<style>

body{
    font-family: Arial;
    background:#0e1117;
    color:white;
    margin:0;
}

.navbar{
    background:#161b22;
    padding:15px;
    font-size:20px;
}

.container{
    padding:40px;
}

.card{
    background:#161b22;
    padding:30px;
    border-radius:10px;
    border-left:6px solid #00c853;
    width:400px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:20px;
    border:none;
    border-radius:6px;
}

button{
    padding:10px 20px;
    background:#00c853;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#00e676;
}

</style>

</head>

<body>

<div class="navbar">
⚙ Door Configuration
</div>

<div class="container">

<div class="card">

<h3>Protected Location</h3>

<label>Door Name</label>
<input type="text" value="Locker Room">

<label>House Name</label>
<input type="text" value="Harshith Residence">

<label>City</label>
<input type="text" value="Hyderabad">

<button>Save Configuration</button>

</div>

</div>

</body>
</html>
