<!DOCTYPE html>
<html>
<head>
<title>Deepfake Guard Login</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.container{
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding:40px;
    border-radius:12px;
    width:320px;
    text-align:center;
    color:white;
}

h2{
    margin-bottom:25px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:6px;
}

button{
    width:100%;
    padding:10px;
    background:#00c853;
    border:none;
    border-radius:6px;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#00e676;
}

</style>
</head>

<body>

<div class="container">

<h2>🎙 Deepfake Guard</h2>

<form action="/dashboard" method="post">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
